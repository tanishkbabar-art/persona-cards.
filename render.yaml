services:
  - type: web
    name: persona-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    rootDir: ./agent-backend
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: PUBLIC_URL
        fromService:
          type: web
          property: url
      - key: CORS_ORIGIN
        value: '*'
      - key: STORAGE_PATH
        value: ./public/generated
